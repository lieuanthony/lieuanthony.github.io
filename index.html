<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/letter.avif">
    <title>to you</title>
</head>
<style>
    html{
        background: #FF9494;
    }

    body{
        font-family: monospace;
        color: white;
        text-align: center;
        text-shadow: 1px 1px 3px rgba(50, 50, 50, 0.5);
    }

    .notification{
        font-size: 1em;
        margin-top: 22%;
    }

    .open{
        font-size: 3em;
        cursor: pointer;
        color: white;
        background-color: transparent;
        border-color: white;
        border-style: solid;
        border-width: 5px;
        padding: 10px;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .open:hover{
        background-color: white;
        color:#FF9494;
    }

    .heart-container{
        margin-top: 5%;
    }

    .heart{
        width: 30%;
        height: auto;
    }
</style>
<body>
    <p class="notification">you've got mail!</p>
    <button class="open" onclick="window.location.href='letter.html'"><b>open</b></button>
    <div class="heart-container">
        <img class="heart" src="images/heart.png">
    </div>
</body>
</html>
